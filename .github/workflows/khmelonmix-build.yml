name: KHMelonMix Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify KHMelonMix source
        run: |
          echo "=== KHMelonMix files ==="
          find melonDS-android-lib/src/khmelonmix -type f | sort

          echo "=== CMake integration ==="
          grep -n -A5 -B3 "KHMelonMix" \
            melonDS-android-lib/src/CMakeLists.txt

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build KHMelonMix APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Find generated APK
        if: always()
        run: |
          echo "=== APK FILES ==="
          find app/build/outputs/apk -type f -name "*.apk" 2>/dev/null || true

      - name: Upload KHMelonMix APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: KHMelonMix-Android
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
